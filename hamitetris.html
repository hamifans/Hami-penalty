<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐹 Hami Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1f130b;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background: linear-gradient(180deg, #2d1b0e, #4a2814);
            padding: 8px 10px 10px;
            max-width: 500px;
            margin: 0 auto;
            justify-content: space-between;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px 6px 2px;
            color: #ffddb0;
            text-shadow: 0 2px 0 #3d281c;
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(14px, 4vw, 22px);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .title span {
            background: #ffb882;
            color: #3d1f0c;
            padding: 1px 8px;
            border-radius: 14px;
            font-size: clamp(9px, 2.5vw, 13px);
            text-shadow: none;
        }

        .stats {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .stat-box {
            background: #3d281c;
            padding: 2px 7px;
            border-radius: 12px;
            font-size: clamp(9px, 2.5vw, 13px);
            font-weight: bold;
            color: #ffddb0;
            box-shadow: inset 0 -2px 0 #1f130b;
            text-align: center;
            line-height: 1.2;
            min-width: 35px;
        }

        .stat-box small {
            display: block;
            font-size: clamp(5px, 1.5vw, 8px);
            opacity: 0.7;
            font-weight: normal;
        }

        .canvas-area {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: stretch;
            flex: 1 1 auto;
            min-height: 0;
            background: #3d281c;
            padding: 6px;
            border-radius: 16px;
            box-shadow: inset 0 0 0 2px #2d1b0e, inset 0 -6px 0 #1f130b;
        }

        .canvas-main-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            position: relative;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 100%;
            background: #1f130b;
            border-radius: 10px;
            image-rendering: pixelated;
            touch-action: none;
            aspect-ratio: 10 / 20;
            object-fit: contain;
        }

        .next-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1f130b;
            border-radius: 10px;
            padding: 4px 6px;
            min-width: clamp(40px, 12vw, 70px);
            border: 2px solid #4a2f1e;
            flex-shrink: 0;
        }

        .next-container .label {
            color: #b88a6a;
            font-size: clamp(6px, 1.8vw, 10px);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        #nextCanvas {
            display: block;
            width: 100%;
            max-width: 70px;
            aspect-ratio: 1 / 1;
            background: #1f130b;
            border-radius: 6px;
            image-rendering: pixelated;
        }

        .info-hami {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ffddb0;
            font-size: clamp(10px, 2.8vw, 14px);
            background: #4a2f1e;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: inset 0 -3px 0 #2d1b0e;
            min-height: 30px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .info-hami .hami-icon {
            width: clamp(28px, 7vw, 38px);
            height: clamp(28px, 7vw, 38px);
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ffb882;
            animation: bounce 1.5s infinite;
            background: #3d281c;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .high-score-row {
            text-align: center;
            font-size: clamp(9px, 2.2vw, 12px);
            color: #b88a6a;
            flex-shrink: 0;
            padding: 2px 0;
        }

        .high-score-row .high-score-display {
            color: #ffd54f;
            font-weight: bold;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .ctrl-btn {
            background: #ffb882;
            border: none;
            border-radius: 12px;
            padding: clamp(8px, 2.5vh, 16px) 0;
            font-size: clamp(18px, 5vw, 30px);
            font-weight: bold;
            color: #3d1f0c;
            box-shadow: 0 4px 0 #b87a4f, 0 3px 10px rgba(0,0,0,0.3);
            transition: all 0.05s ease;
            touch-action: manipulation;
            cursor: pointer;
            text-align: center;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-touch-callout: none;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b87a4f;
        }

        .ctrl-btn.wide {
            grid-column: span 2;
        }

        .ctrl-btn.restart {
            background: #ff8a7a;
            box-shadow: 0 4px 0 #b85a4a;
        }

        .ctrl-btn:active.restart {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b85a4a;
        }

        .ctrl-btn.music {
            background: #81c784;
            box-shadow: 0 4px 0 #4caf50;
            font-size: clamp(14px, 3.5vw, 20px);
            padding: clamp(6px, 1.8vh, 12px) 0;
            min-height: 36px;
        }

        .ctrl-btn:active.music {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #4caf50;
        }

        .music-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .music-row .ctrl-btn {
            flex: 1;
            max-width: 140px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .game-wrapper { flex-direction: row; flex-wrap: wrap; align-items: center; padding: 6px 10px; gap: 4px; }
            .header { width: 100%; padding-bottom: 2px; }
            .canvas-area { flex: 2; min-height: 200px; max-height: 70vh; padding: 4px; }
            .controls { flex: 1; min-width: 120px; max-width: 200px; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 0; }
            .controls .ctrl-btn.wide { grid-column: span 2; }
            .controls .ctrl-btn { padding: clamp(4px, 1.5vh, 10px) 0; font-size: clamp(14px, 3vw, 22px); min-height: 32px; }
            .info-hami { display: none; }
            .high-score-row { width: 100%; order: 10; padding: 0; }
            .music-row { order: 11; width: 100%; margin-top: 2px; }
            .music-row .ctrl-btn { padding: clamp(3px, 1vh, 8px) 0; font-size: clamp(11px, 2vw, 16px); min-height: 28px; }
            .next-container { min-width: clamp(30px, 8vw, 50px); padding: 3px 4px; }
            #nextCanvas { max-width: 50px; }
        }

        @media (max-width: 350px) {
            .game-wrapper { padding: 4px 6px 6px; }
            .controls { gap: 4px; }
            .ctrl-btn { border-radius: 8px; min-height: 36px; font-size: 16px; }
            .stat-box { padding: 1px 4px; font-size: 9px; min-width: 28px; }
            .stat-box small { font-size: 5px; }
        }

        @supports (padding: max(0px)) {
            .game-wrapper {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
                padding-top: max(8px, env(safe-area-inset-top));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- HEADER -->
    <div class="header">
        <div class="title">
            🐹 Hami
            <span>Tetris</span>
        </div>
        <div class="stats">
            <div class="stat-box"><span id="scoreDisplay">0</span><small>SCORE</small></div>
            <div class="stat-box"><span id="levelDisplay">1</span><small>LVL</small></div>
            <div class="stat-box"><span id="linesDisplay">0</span><small>LINES</small></div>
        </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-area">
        <div class="canvas-main-wrap">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div class="next-container">
            <div class="label">NEXT</div>
            <canvas id="nextCanvas" width="120" height="120"></canvas>
        </div>
    </div>

    <!-- HIGH SCORE -->
    <div class="high-score-row">
        🏆 Best: <span class="high-score-display" id="highScoreDisplay">0</span>
    </div>

    <!-- INFO HAMI -->
    <div class="info-hami">
        <img class="hami-icon" id="hamiAvatar" src="https://i.ibb.co.com/jkGBcYNm/Picsart-24-09-20-00-43-53-579.png" alt="Karakter">
        <span id="statusText">Let's play, Hami!</span>
        <img class="hami-icon" id="hamiAvatar2" src="https://i.ibb.co.com/jkGBcYNm/Picsart-24-09-20-00-43-53-579.png" alt="Karakter">
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button class="ctrl-btn" id="btnLeft">◀</button>
        <button class="ctrl-btn" id="btnRotate">🔄</button>
        <button class="ctrl-btn" id="btnDown">▼</button>
        <button class="ctrl-btn" id="btnRight">▶</button>
        <button class="ctrl-btn wide" id="btnDrop">⬇⬇ DROP</button>
        <button class="ctrl-btn restart wide" id="btnRestart">🔄 NEW</button>
    </div>

    <!-- MUSIC -->
    <div class="music-row">
        <button class="ctrl-btn music" id="btnMusicToggle">🔊 Music</button>
    </div>
</div>

<script>
    (function() {
        // ============================================================
        // KARAKTER
        // ============================================================
        const CHARACTER_URL = "https://i.ibb.co.com/jkGBcYNm/Picsart-24-09-20-00-43-53-579.png";
        let characterImage = null;
        let imageLoaded = false;

        function loadCharacter() {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() {
                characterImage = img;
                imageLoaded = true;
                drawCanvas();
                drawNext();
                document.getElementById('hamiAvatar').src = CHARACTER_URL;
                document.getElementById('hamiAvatar2').src = CHARACTER_URL;
            };
            img.onerror = function() {
                characterImage = null;
                imageLoaded = false;
                drawCanvas();
                drawNext();
            };
            img.src = CHARACTER_URL;
        }

        // ============================================================
        // AUDIO
        // ============================================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicTimeout = null;
        let isMusicOn = true;

        const NOTES = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25,
            'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99,
            'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
        };

        const MELODY = [
            { note: 'C4', duration: 200 }, { note: 'E4', duration: 200 },
            { note: 'G4', duration: 200 }, { note: 'C5', duration: 300 },
            { note: 'B4', duration: 200 }, { note: 'G4', duration: 200 },
            { note: 'E4', duration: 200 }, { note: 'D4', duration: 300 },
            { note: 'C4', duration: 200 }, { note: 'E4', duration: 200 },
            { note: 'G4', duration: 200 }, { note: 'C5', duration: 300 },
            { note: 'B4', duration: 200 }, { note: 'G4', duration: 200 },
            { note: 'E4', duration: 200 }, { note: 'D4', duration: 400 },
            { note: 'E4', duration: 200 }, { note: 'F4', duration: 200 },
            { note: 'G4', duration: 200 }, { note: 'A4', duration: 300 },
            { note: 'G4', duration: 200 }, { note: 'F4', duration: 200 },
            { note: 'E4', duration: 200 }, { note: 'C4', duration: 400 },
            { note: 'C4', duration: 200 }, { note: 'E4', duration: 200 },
            { note: 'G4', duration: 200 }, { note: 'C5', duration: 300 },
            { note: 'B4', duration: 200 }, { note: 'G4', duration: 200 },
            { note: 'E4', duration: 200 }, { note: 'C4', duration: 400 }
        ];

        function playNote(frequency, duration, type = 'square') {
            if (!isMusicOn) return;
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + duration / 1000);
            } catch (e) {}
        }

        function playMelody() {
            let time = 0;
            MELODY.forEach((item) => {
                setTimeout(() => {
                    const freq = NOTES[item.note];
                    if (freq) playNote(freq, item.duration, 'square');
                }, time);
                time += item.duration;
            });
            musicTimeout = setTimeout(() => {
                if (isMusicOn) playMelody();
            }, time + 200);
        }

        function toggleMusic() {
            if (isMusicOn) {
                isMusicOn = false;
                if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
                document.getElementById('btnMusicToggle').textContent = '🔇 Music';
            } else {
                isMusicOn = true;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                document.getElementById('btnMusicToggle').textContent = '🔊 Music';
                playMelody();
            }
        }

        // ============================================================
        // GAME TETRIS
        // ============================================================
        const COLS = 10;
        const ROWS = 20;
        let BLOCK_SIZE = 30;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const scoreDisplay = document.getElementById('scoreDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const linesDisplay = document.getElementById('linesDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const statusText = document.getElementById('statusText');

        let highScore = parseInt(localStorage.getItem('hamiTetrisHighScore')) || 0;
        highScoreDisplay.textContent = highScore;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('hamiTetrisHighScore', highScore.toString());
                highScoreDisplay.textContent = highScore;
                statusText.innerText = '🎉 NEW HIGH SCORE! Amazing!';
            }
        }

        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let dropInterval = null;
        let currentPiece = null;
        let nextPiece = null;
        let currentX = 0;
        let currentY = 0;

        // ============================================================
        // ANTI SPAM & DELAY UNTUK SEMUA TOMBOL
        // ============================================================
        let actionCooldown = false;
        const ACTION_DELAY = 120; // ms jeda antar aksi

        function executeAction(action) {
            if (actionCooldown || gameOver || !currentPiece) return;
            actionCooldown = true;
            action();
            setTimeout(() => {
                actionCooldown = false;
            }, ACTION_DELAY);
        }

        const SHAPES = [
            { blocks: [[1,1,1,1]], color: '#4dd0e1' },
            { blocks: [[1,1],[1,1]], color: '#fff176' },
            { blocks: [[0,1,0],[1,1,1]], color: '#ce93d8' },
            { blocks: [[0,1,1],[1,1,0]], color: '#81c784' },
            { blocks: [[1,1,0],[0,1,1]], color: '#ef9a9a' },
            { blocks: [[1,0,0],[1,1,1]], color: '#ffb74d' },
            { blocks: [[0,0,1],[1,1,1]], color: '#64b5f6' }
        ];

        function getDropInterval() {
            const speeds = [400, 350, 300, 250, 200, 150, 120, 100, 80, 70];
            const idx = Math.min(Math.floor(lines / 5), speeds.length - 1);
            level = idx + 1;
            levelDisplay.textContent = level;
            return speeds[idx];
        }

        function createBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board.push(new Array(COLS).fill(0));
            }
        }

        function randomPiece() {
            const idx = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[idx];
            return {
                blocks: shape.blocks.map(row => [...row]),
                color: shape.color
            };
        }

        function spawnNewPiece() {
            if (!nextPiece) nextPiece = randomPiece();
            currentPiece = {
                blocks: nextPiece.blocks.map(row => [...row]),
                color: nextPiece.color
            };
            nextPiece = randomPiece();
            currentX = Math.floor((COLS - currentPiece.blocks[0].length) / 2);
            currentY = 0;

            if (collision(currentPiece.blocks, currentX, currentY)) {
                gameOver = true;
                clearInterval(dropInterval);
                dropInterval = null;
                statusText.innerText = '💔 Game Over...';
                updateHighScore();
                return false;
            }
            statusText.innerText = '🐹 Playing!';
            return true;
        }

        function collision(blocks, offsetX, offsetY) {
            for (let r = 0; r < blocks.length; r++) {
                for (let c = 0; c < blocks[0].length; c++) {
                    if (blocks[r][c] !== 0) {
                        const newX = offsetX + c;
                        const newY = offsetY + r;
                        if (newX < 0 || newX >= COLS || newY >= ROWS || newY < 0) return true;
                        if (newY >= 0 && board[newY][newX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!currentPiece) return;
            for (let r = 0; r < currentPiece.blocks.length; r++) {
                for (let c = 0; c < currentPiece.blocks[0].length; c++) {
                    if (currentPiece.blocks[r][c] !== 0) {
                        const boardY = currentY + r;
                        const boardX = currentX + c;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }

            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; ) {
                let full = true;
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] === 0) { full = false; break; }
                }
                if (full) {
                    for (let r2 = r; r2 > 0; r2--) board[r2] = [...board[r2-1]];
                    board[0] = new Array(COLS).fill(0);
                    cleared++;
                } else {
                    r--;
                }
            }

            if (cleared > 0) {
                const bonus = [0, 100, 300, 600, 1000];
                const addScore = bonus[Math.min(cleared, 4)] * level;
                score += addScore;
                lines += cleared;
                updateScore();
                updateHighScore();

                if (dropInterval) {
                    clearInterval(dropInterval);
                    dropInterval = setInterval(() => {
                        if (!gameOver && currentPiece) movePieceAction(0, 1);
                    }, getDropInterval());
                }

                if (cleared >= 2) {
                    statusText.innerText = `🌟 Ate ${cleared} seeds! +${addScore}`;
                    playNote(523.25, 150);
                    setTimeout(() => playNote(659.25, 150), 150);
                } else {
                    statusText.innerText = `🐹 Ate a seed! +${addScore}`;
                    playNote(440.00, 100);
                }
            }

            const success = spawnNewPiece();
            if (!success) {
                gameOver = true;
                clearInterval(dropInterval);
                dropInterval = null;
                statusText.innerText = '💔 Game Over...';
                updateHighScore();
                playNote(293.66, 300);
                setTimeout(() => playNote(220.00, 400), 300);
            }
            drawCanvas();
            drawNext();
        }

        // ============================================================
        // FUNGSI GERAKAN - DIPISAHKAN AGAR TIDAK BENTROK DENGAN ANTI SPAM
        // ============================================================
        function movePieceAction(dx, dy) {
            if (!currentPiece || gameOver) return false;
            if (!collision(currentPiece.blocks, currentX + dx, currentY + dy)) {
                currentX += dx;
                currentY += dy;
                drawCanvas();
                return true;
            } else if (dy === 1) {
                lockPiece();
                drawCanvas();
                return false;
            }
            return false;
        }

        function rotatePieceAction() {
            if (!currentPiece || gameOver) return;
            const rotated = currentPiece.blocks[0].map((_, idx) => 
                currentPiece.blocks.map(row => row[idx]).reverse()
            );
            if (!collision(rotated, currentX, currentY)) {
                currentPiece.blocks = rotated;
                drawCanvas();
                playNote(698.46, 80);
            } else if (!collision(rotated, currentX - 1, currentY)) {
                currentPiece.blocks = rotated;
                currentX -= 1;
                drawCanvas();
                playNote(698.46, 80);
            } else if (!collision(rotated, currentX + 1, currentY)) {
                currentPiece.blocks = rotated;
                currentX += 1;
                drawCanvas();
                playNote(698.46, 80);
            }
        }

        function hardDropAction() {
            if (!currentPiece || gameOver) return;
            // Turunkan sampai mentok
            while (!collision(currentPiece.blocks, currentX, currentY + 1)) {
                currentY++;
            }
            playNote(392.00, 100);
            lockPiece();
            drawCanvas();
        }

        // ============================================================
        // WRAPPER UNTUK EKSEKUSI DENGAN ANTI SPAM
        // ============================================================
        function executeMove(dx, dy) {
            executeAction(() => movePieceAction(dx, dy));
        }

        function executeRotate() {
            executeAction(rotatePieceAction);
        }

        function executeHardDrop() {
            if (actionCooldown || gameOver || !currentPiece) return;
            actionCooldown = true;
            hardDropAction();
            setTimeout(() => {
                actionCooldown = false;
            }, 200); // Jeda lebih lama untuk drop
        }

        // ============================================================
        // DRAWING
        // ============================================================
        function drawCharacterInBlock(context, x, y, size) {
            if (imageLoaded && characterImage) {
                context.save();
                context.beginPath();
                context.arc(x + size/2, y + size/2, size/2 - 2, 0, Math.PI * 2);
                context.clip();
                context.drawImage(characterImage, x + 2, y + 2, size - 4, size - 4);
                context.restore();
                context.strokeStyle = 'rgba(255,255,255,0.25)';
                context.lineWidth = 1.5;
                context.beginPath();
                context.arc(x + size/2, y + size/2, size/2 - 2, 0, Math.PI * 2);
                context.stroke();
            } else {
                context.font = `${size-4}px Arial`;
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillStyle = '#1f130b';
                context.fillText('🐹', x + size/2, y + size/2 + 2);
            }
        }

        function drawBlock(context, col, row, color, size) {
            const x = col * size;
            const y = row * size;
            context.fillStyle = color;
            context.shadowColor = 'rgba(255,255,255,0.15)';
            context.shadowBlur = 4;
            context.fillRect(x+1, y+1, size-2, size-2);
            context.shadowBlur = 0;
            context.fillStyle = 'rgba(255,255,255,0.2)';
            context.fillRect(x+2, y+2, size-8, 4);
        }

        function drawBlockWithCharacter(context, col, row, color, size) {
            const x = col * size;
            const y = row * size;
            context.fillStyle = color;
            context.shadowColor = 'rgba(255,200,100,0.2)';
            context.shadowBlur = 8;
            context.fillRect(x+1, y+1, size-2, size-2);
            context.shadowBlur = 0;
            drawCharacterInBlock(context, x, y, size);
            context.fillStyle = 'rgba(255,255,230,0.08)';
            context.fillRect(x+3, y+3, size-10, 3);
        }

        function drawCanvas() {
            const rect = canvas.getBoundingClientRect();
            const displaySize = rect.width / COLS;
            BLOCK_SIZE = displaySize;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const color = board[r][c];
                    if (color !== 0) {
                        drawBlock(ctx, c, r, color, BLOCK_SIZE);
                    } else {
                        ctx.fillStyle = '#2a1a0f';
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        ctx.fillStyle = '#3d281c';
                        ctx.fillRect(c * BLOCK_SIZE+1, r * BLOCK_SIZE+1, BLOCK_SIZE-2, BLOCK_SIZE-2);
                    }
                }
            }

            if (currentPiece && !gameOver) {
                const blocks = currentPiece.blocks;
                for (let r = 0; r < blocks.length; r++) {
                    for (let c = 0; c < blocks[0].length; c++) {
                        if (blocks[r][c] !== 0) {
                            drawBlockWithCharacter(ctx, currentX + c, currentY + r, currentPiece.color, BLOCK_SIZE);
                        }
                    }
                }
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffddb0';
                ctx.font = 'bold 26px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🐹 GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '14px Arial';
                ctx.fillText('Press "NEW"', canvas.width/2, canvas.height/2 + 30);
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, 120, 120);
            if (!nextPiece) return;
            const blocks = nextPiece.blocks;
            const blockSize = 25;
            const cols = blocks[0].length;
            const rows = blocks.length;
            const offsetX = (120 - cols * blockSize) / 2;
            const offsetY = (120 - rows * blockSize) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (blocks[r][c] !== 0) {
                        const x = offsetX + c * blockSize;
                        const y = offsetY + r * blockSize;
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.shadowColor = 'rgba(255,200,100,0.2)';
                        nextCtx.shadowBlur = 6;
                        nextCtx.fillRect(x+1, y+1, blockSize-2, blockSize-2);
                        nextCtx.shadowBlur = 0;
                        
                        if (imageLoaded && characterImage) {
                            nextCtx.save();
                            nextCtx.beginPath();
                            nextCtx.arc(x + blockSize/2, y + blockSize/2, blockSize/2 - 3, 0, Math.PI * 2);
                            nextCtx.clip();
                            nextCtx.drawImage(characterImage, x + 3, y + 3, blockSize - 6, blockSize - 6);
                            nextCtx.restore();
                        } else {
                            nextCtx.font = `${blockSize-6}px Arial`;
                            nextCtx.textAlign = 'center';
                            nextCtx.textBaseline = 'middle';
                            nextCtx.fillStyle = '#1f130b';
                            nextCtx.fillText('🐹', x + blockSize/2, y + blockSize/2 + 1);
                        }
                        nextCtx.fillStyle = 'rgba(255,255,230,0.1)';
                        nextCtx.fillRect(x+3, y+3, blockSize-10, 3);
                    }
                }
            }
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            linesDisplay.textContent = lines;
            levelDisplay.textContent = level;
        }

        function handleResize() {
            drawCanvas();
        }

        function resetGame() {
            if (dropInterval) { clearInterval(dropInterval); dropInterval = null; }
            actionCooldown = false;
            createBoard();
            score = 0; level = 1; lines = 0; gameOver = false;
            nextPiece = randomPiece();
            updateScore();
            spawnNewPiece();
            statusText.innerText = '🐹 Ready!';
            drawCanvas();
            drawNext();
            dropInterval = setInterval(() => {
                if (!gameOver && currentPiece) movePieceAction(0, 1);
            }, getDropInterval());
        }

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            loadCharacter();

            createBoard();
            nextPiece = randomPiece();
            spawnNewPiece();
            updateScore();
            drawCanvas();
            drawNext();

            dropInterval = setInterval(() => {
                if (!gameOver && currentPiece) movePieceAction(0, 1);
            }, getDropInterval());

            // ============================================================
            // EVENT TOMBOL - DIPERBAIKI TOTAL
            // ============================================================
            function setupButton(id, callback) {
                const el = document.getElementById(id);
                if (!el) return;
                
                // Hapus semua event listener lama (pakai clone untuk bersih)
                const newEl = el.cloneNode(true);
                el.parentNode.replaceChild(newEl, el);
                
                // Event untuk touch dan mouse
                newEl.addEventListener('pointerdown', function(e) {
                    e.preventDefault();
                    callback();
                });
                newEl.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    callback();
                }, { passive: false });
                newEl.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    callback();
                });
                
                // Kembalikan ID
                newEl.id = id;
            }

            // Setup semua tombol dengan callback masing-masing
            setupButton('btnLeft', () => executeMove(-1, 0));
            setupButton('btnRight', () => executeMove(1, 0));
            setupButton('btnDown', () => executeMove(0, 1));
            setupButton('btnRotate', executeRotate);
            setupButton('btnDrop', executeHardDrop);
            setupButton('btnRestart', resetGame);
            setupButton('btnMusicToggle', toggleMusic);

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') { e.preventDefault(); executeMove(-1, 0); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); executeMove(1, 0); }
                else if (e.key === 'ArrowDown') { e.preventDefault(); executeMove(0, 1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); executeRotate(); }
                else if (e.key === ' ') { e.preventDefault(); executeHardDrop(); }
                else if (e.key === 'r' || e.key === 'R') { resetGame(); }
                else if (e.key === 'm' || e.key === 'M') { toggleMusic(); }
            });

            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => setTimeout(handleResize, 300));

            const startAudio = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (!musicTimeout && isMusicOn) playMelody();
                document.removeEventListener('click', startAudio);
                document.removeEventListener('touchstart', startAudio);
            };
            document.addEventListener('click', startAudio);
            document.addEventListener('touchstart', startAudio);
            setTimeout(() => {
                if (audioCtx.state === 'running' && !musicTimeout) playMelody();
            }, 1000);
        }

        init();
    })();
</script>
</body>
</html>
